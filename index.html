<!DOCTYPE html>

<html>

<head>
<title>Used Car Price Calculator</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:400px;
box-shadow:0 0 12px rgba(0,0,0,0.15);
text-align:center;
}

select,input{
width:100%;
padding:10px;
margin-top:12px;
font-size:16px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#2e7d32;
color:white;
border:none;
font-size:18px;
border-radius:6px;
cursor:pointer;
}

#result{
margin-top:20px;
font-size:18px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Used Car Price Calculator</h2>

<select id="brand" onchange="populateModels()">
<option value="">Select Brand</option>
</select>

<select id="model">
<option value="">Select Model</option>
</select>

<select id="fuel">
<option value="1">Petrol</option>
<option value="1.03">Diesel</option>
<option value="1.05">Hybrid</option>
<option value="0.95">CNG</option>
</select>

<select id="owners">
<option value="1">1st Owner</option>
<option value="0.93">2nd Owner</option>
<option value="0.85">3rd Owner</option>
<option value="0.75">4th Owner</option>
</select>

<input id="price" type="number" placeholder="Original On-Road Price">

<input id="year" type="number" placeholder="Manufacturing Year">

<input id="kms" type="number" placeholder="Kilometers Driven">

<button onclick="calculateValue()">Check Price</button>

<div id="result"></div>

</div>

<script>

/* BRAND → MODEL DATABASE */

const carData = {

"Maruti Suzuki": ["Swift","Baleno","WagonR","Brezza","Fronx","Dzire"],

"Hyundai": ["i20","Creta","Venue","Verna","Exter"],

"Tata": ["Tiago","Altroz","Punch","Nexon","Harrier"],

"Mahindra": ["Thar","XUV300","XUV700","Scorpio"],

"Toyota": ["Glanza","Hyryder","Fortuner","Innova"],

"Kia": ["Sonet","Seltos","Carens"],

"Honda": ["Amaze","City","Elevate"],

"Renault": ["Kiger","Triber","Kwid"],

"Nissan": ["Magnite"]

};


/* LOAD BRANDS */

window.onload=function(){

const brandDropdown=document.getElementById("brand");

Object.keys(carData).forEach(brand=>{

let option=document.createElement("option");

option.value=brand;
option.text=brand;

brandDropdown.appendChild(option);

});

};


/* MODEL DROPDOWN */

function populateModels(){

const brand=document.getElementById("brand").value;

const modelDropdown=document.getElementById("model");

modelDropdown.innerHTML="<option>Select Model</option>";

if(!carData[brand]) return;

carData[brand].forEach(model=>{

let option=document.createElement("option");

option.value=model;
option.text=model;

modelDropdown.appendChild(option);

});

}


/* DEPRECIATION CURVE */

function depreciation(price,age){

let value=price;

for(let i=1;i<=age;i++){

if(i==1) value*=0.82;
else if(i==2) value*=0.88;
else if(i==3) value*=0.90;
else if(i==4) value*=0.92;
else if(i==5) value*=0.93;
else value*=0.95;

}

return value;

}


/* KM FACTOR */

function kmFactor(km){

if(km<20000) return 1.03;
if(km<40000) return 1;
if(km<60000) return 0.97;
if(km<80000) return 0.94;
if(km<100000) return 0.90;
if(km<130000) return 0.85;

return 0.80;

}


/* BRAND RESALE */

function brandFactor(brand){

if(brand.includes("Toyota")) return 1.06;
if(brand.includes("Maruti")) return 1.05;
if(brand.includes("Hyundai")) return 1.04;
if(brand.includes("Honda")) return 1.03;
if(brand.includes("Tata")) return 1.02;
if(brand.includes("Mahindra")) return 1.02;

return 1;

}


/* CALCULATOR */

function calculateValue(){

let brand=document.getElementById("brand").value;

let price=document.getElementById("price").value;

let year=document.getElementById("year").value;

let km=document.getElementById("kms").value;

let fuel=document.getElementById("fuel").value;

let owners=document.getElementById("owners").value;

if(!price || !year){

document.getElementById("result").innerHTML="Enter price and year";

return;

}

let age=new Date().getFullYear()-year;

let value=depreciation(price,age);

value*=brandFactor(brand);

value*=fuel;

value*=owners;

value*=kmFactor(km);

let min=Math.round(value*0.95);

let max=Math.round(value*1.05);

document.getElementById("result").innerHTML=

"Estimated Used Price: ₹"+min+" – ₹"+max;

}

</script>

</body>

</html>
