<!DOCTYPE html>

<html>

<head>

<title>Used Car Price Calculator</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:360px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
}

input,select{
width:100%;
padding:10px;
margin-top:12px;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#2e7d32;
color:white;
border:none;
font-size:18px;
border-radius:5px;
cursor:pointer;
}

#result{
margin-top:20px;
font-size:18px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Check Used Car Price</h2>

<select id="brand" onchange="populateModels()">
<option value="">Select Brand</option>
<option>Maruti Suzuki</option>
<option>Hyundai</option>
<option>Tata</option>
<option>Mahindra</option>
<option>Toyota</option>
<option>Kia</option>
<option>Honda</option>
<option>Renault</option>
<option>Nissan</option>
</select>

<select id="model">
<option value="">Select Model</option>
</select>

<input type="number" id="year" placeholder="Manufacturing Year">

<input type="number" id="kms" placeholder="Kilometers Driven">

<button onclick="calculateValue()">Check Price</button>

<div id="result"></div>

</div>

<script>

let carDatabase = [];


/* LOAD CSV */

async function loadCarData(){

const response = await fetch("data/car_data.csv");
const text = await response.text();

const rows = text.split("\n");

rows.forEach(row => {

if(!row.trim()) return;

const cols = row.split(",");

if(cols.length < 6) return;

carDatabase.push({
brand: cols[0].trim().toLowerCase(),
model: cols[1].trim().toLowerCase(),
segment: cols[2].trim().toLowerCase(),
basePrice: parseInt(cols[4]),
depreciation: parseFloat(cols[5])
});

});

console.log("Cars loaded:", carDatabase.length);

}

window.onload = loadCarData;



/* POPULATE MODELS */

function populateModels(){

let brand = document.getElementById("brand").value.toLowerCase();
let dropdown = document.getElementById("model");

dropdown.innerHTML = "<option value=''>Select Model</option>";

let models = carDatabase.filter(car =>
car.brand.includes(brand)
);

let unique = [...new Set(models.map(car => car.model))];

unique.forEach(model => {

let option = document.createElement("option");

option.value = model;
option.text = model;

dropdown.appendChild(option);

});

}
