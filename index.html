<!DOCTYPE html>

<html>

<head>
<title>Used Car Price Calculator</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:380px;
box-shadow:0 0 10px rgba(0,0,0,0.15);
text-align:center;
}

select,input{
width:100%;
padding:10px;
margin-top:12px;
font-size:16px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#2e7d32;
color:white;
border:none;
font-size:18px;
border-radius:5px;
cursor:pointer;
}

#result{
margin-top:20px;
font-size:18px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Used Car Price Calculator</h2>

<select id="brand">
<option>Select Brand</option>
</select>

<select id="model">
<option>Select Model</option>
</select>

<input id="year" placeholder="Manufacturing Year">

<input id="kms" placeholder="Kilometers Driven">

<button onclick="calculateValue()">Check Price</button>

<div id="result"></div>

</div>

<script>

let cars=[];

/* LOAD DATA */

async function loadCars(){

try{

const response=await fetch("cars.json");

cars=await response.json();

populateBrands();

}
catch(e){

console.log("Dataset failed to load");

}

}

window.onload=loadCars;


/* LOAD BRANDS */

function populateBrands(){

let brandDropdown=document.getElementById("brand");

let brands=[...new Set(cars.map(c=>c.brand))];

brands.sort();

brands.forEach(b=>{

let option=document.createElement("option");

option.value=b;

option.text=b;

brandDropdown.appendChild(option);

});

brandDropdown.addEventListener("change",populateModels);

}


/* LOAD MODELS */

function populateModels(){

let brand=document.getElementById("brand").value;

let modelDropdown=document.getElementById("model");

modelDropdown.innerHTML="<option>Select Model</option>";

let models=cars.filter(c=>c.brand===brand);

models.forEach(car=>{

let option=document.createElement("option");

option.value=car.model;

option.text=car.model;

modelDropdown.appendChild(option);

});

}


/* SIMPLE PRICE CALC */

function calculateValue(){

let brand=document.getElementById("brand").value;

let model=document.getElementById("model").value;

let year=document.getElementById("year").value;

let km=document.getElementById("kms").value;

let car=cars.find(c=>c.brand===brand && c.model===model);

if(!car){

document.getElementById("result").innerHTML="Car not found";

return;

}

let age=new Date().getFullYear()-year;

let value=car.onroad*Math.pow(0.9,age);

if(km>80000) value*=0.9;

let min=Math.round(value*0.95);

let max=Math.round(value*1.05);

document.getElementById("result").innerHTML="₹"+min+" - ₹"+max;

}

</script>

</body>

</html>
