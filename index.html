<!DOCTYPE html>

<html>

<head>
<title>Used Car Price Calculator</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:420px;
box-shadow:0 0 12px rgba(0,0,0,0.15);
text-align:center;
}

select,input{
width:100%;
padding:10px;
margin-top:12px;
font-size:16px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#2e7d32;
color:white;
border:none;
font-size:18px;
border-radius:6px;
cursor:pointer;
}

#result{
margin-top:20px;
font-size:18px;
font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<h2>Used Car Price Calculator</h2>

<select id="brand" onchange="populateModels()">
<option>Select Brand</option>
</select>

<select id="model" onchange="populateVariants()">
<option>Select Model</option>
</select>

<select id="variant" onchange="setCarDetails()">
<option>Select Variant</option>
</select>

<select id="fuel">
<option>Select Fuel</option>
</select>

<select id="transmission">
<option>Select Transmission</option>
</select>

<select id="owners">
<option value="1">1st Owner</option>
<option value="0.93">2nd Owner</option>
<option value="0.85">3rd Owner</option>
<option value="0.75">4th Owner</option>
</select>

<input id="year" type="number" placeholder="Manufacturing Year">

<input id="kms" type="number" placeholder="Kilometers Driven">

<button onclick="calculateValue()">Check Price</button>

<div id="result"></div>

<button onclick="toggleDealer()">Show Dealer View</button>

<div id="dealerBox" style="display:none; margin-top:15px;">
<div id="dealerResult"></div>
    
</div>

<script>

let cars = [];
let selectedCar = null;


/* LOAD DATASET */

document.addEventListener("DOMContentLoaded", loadCars);

async function loadCars(){

const response = await fetch("cars.json");
cars = await response.json();

populateBrands();

}


/* BRAND */

function populateBrands(){

let brands = [...new Set(cars.map(c => c.brand))];

brands.sort();

let dropdown = document.getElementById("brand");

brands.forEach(b => {

let option = document.createElement("option");
option.value = b;
option.text = b;

dropdown.appendChild(option);

});

}


/* MODEL */

function populateModels(){

let brand = document.getElementById("brand").value;

let dropdown = document.getElementById("model");
dropdown.innerHTML = "<option>Select Model</option>";

let models = cars.filter(c => c.brand === brand);

let unique = [...new Set(models.map(c => c.model))];

unique.forEach(m => {

let option = document.createElement("option");
option.value = m;
option.text = m;

dropdown.appendChild(option);

});

}


/* VARIANT */

function populateVariants(){

let brand = document.getElementById("brand").value;
let model = document.getElementById("model").value;

let dropdown = document.getElementById("variant");
dropdown.innerHTML = "<option>Select Variant</option>";

let filtered = cars.filter(c => c.brand === brand && c.model === model);

filtered.forEach(car => {

let option = document.createElement("option");

option.value = JSON.stringify(car);
option.text = car.variant + " (₹" + car.onroad + ")";

dropdown.appendChild(option);

});

}


/* SET DETAILS */

function setCarDetails(){

selectedCar = JSON.parse(document.getElementById("variant").value);

/* fuel dropdown */
let fuelDropdown = document.getElementById("fuel");
fuelDropdown.innerHTML = "<option>" + selectedCar.fuel + "</option>";

/* transmission dropdown */
let transDropdown = document.getElementById("transmission");
transDropdown.innerHTML = "<option>" + selectedCar.transmission + "</option>";

}


/* DEPRECIATION */

function depreciation(price, age){

let value = price;

for(let i=1;i<=age;i++){

if(i==1) value*=0.82;
else if(i==2) value*=0.88;
else if(i==3) value*=0.90;
else if(i==4) value*=0.92;
else if(i==5) value*=0.93;
else value*=0.95;

}

return value;

}


/* KM FACTOR */

function kmFactor(km){

if(km<20000) return 1.03;
if(km<40000) return 1;
if(km<60000) return 0.97;
if(km<80000) return 0.94;
if(km<100000) return 0.90;
if(km<130000) return 0.85;

return 0.80;

}


function toggleDealer(){

let box = document.getElementById("dealerBox");

if(box.style.display === "none"){
box.style.display = "block";
}else{
box.style.display = "none";
}

}

/* CALCULATOR */

function calculateValue(){

if(!selectedCar){

document.getElementById("result").innerHTML="Select a variant";
return;

}

let year = document.getElementById("year").value;
let km = document.getElementById("kms").value;
let owners = document.getElementById("owners").value;

let age = new Date().getFullYear() - year;


/* NEW LOGIC */

let depValue = depreciation(selectedCar.ex_showroom, age);

let marketValue = selectedCar.onroad * Math.pow(0.85, age);

let value = (depValue + marketValue) / 2;

/* DEALER CALCULATIONS */

let marketPrice = value;

/* dealer typically buys at 85–88% */

let dealerBuy = marketPrice * 0.87;

/* dealer listing slightly higher */

let listingPrice = marketPrice * 1.05;

/* margin */

let margin = ((listingPrice - dealerBuy) / dealerBuy) * 100;


/* adjustments */

value *= kmFactor(km);
value *= owners;


/* result */

let min = Math.round(value * 0.95);
let max = Math.round(value * 1.05);

document.getElementById("result").innerHTML =
"Estimated Market Price: ₹" + min + " – ₹" + max;

document.getElementById("dealerResult").innerHTML =

"Dealer Buy Price: ₹" + Math.round(dealerBuy) +
"<br>Listing Price: ₹" + Math.round(listingPrice) +
"<br>Margin: " + margin.toFixed(1) + "%";

}

</script>

</body>

</html>
