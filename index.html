<script>

let cars=[];


/* LOAD DATASET */

async function loadCars(){

try{

const response=await fetch("cars.json");

cars=await response.json();

/* remove bad rows */

cars=cars.filter(c=>c.brand && c.model && c.onroad);

populateBrands();

}
catch(e){

console.log("Dataset failed to load");

}

}

window.onload=loadCars;


/* BRAND DROPDOWN */

function populateBrands(){

let dropdown=document.getElementById("brand");

dropdown.innerHTML="<option>Select Brand</option>";

let brands=[...new Set(cars.map(c=>c.brand))];

brands.sort();

brands.forEach(b=>{

let option=document.createElement("option");

option.value=b;
option.text=b;

dropdown.appendChild(option);

});

dropdown.addEventListener("change",populateModels);

}


/* MODEL DROPDOWN */

function populateModels(){

let brand=document.getElementById("brand").value;

let dropdown=document.getElementById("model");

dropdown.innerHTML="<option>Select Model</option>";

let models=cars.filter(c=>c.brand===brand);

let unique=[...new Set(models.map(c=>c.model))];

unique.sort();

unique.forEach(m=>{

let option=document.createElement("option");

option.value=m;
option.text=m;

dropdown.appendChild(option);

});

}


/* DEPRECIATION CURVE */

function depreciation(price,age){

let value=price;

for(let i=1;i<=age;i++){

if(i==1) value*=0.82;
else if(i==2) value*=0.88;
else if(i==3) value*=0.90;
else if(i==4) value*=0.92;
else if(i==5) value*=0.93;
else value*=0.95;

}

return value;

}


/* BRAND RESALE FACTOR */

function brandFactor(brand){

brand=brand.toLowerCase();

if(brand.includes("toyota")) return 1.06;
if(brand.includes("maruti")) return 1.05;
if(brand.includes("hyundai")) return 1.04;
if(brand.includes("honda")) return 1.03;
if(brand.includes("tata")) return 1.02;
if(brand.includes("mahindra")) return 1.02;
if(brand.includes("volkswagen")) return 0.97;
if(brand.includes("skoda")) return 0.96;
if(brand.includes("renault")) return 0.95;
if(brand.includes("nissan")) return 0.94;

return 1;

}


/* KM ADJUSTMENT */

function kmFactor(km){

if(km < 20000) return 1.03;
else if(km < 40000) return 1;
else if(km < 60000) return 0.97;
else if(km < 80000) return 0.94;
else if(km < 100000) return 0.90;
else if(km < 130000) return 0.85;
else return 0.80;

}


/* CALCULATOR */

function calculateValue(){

let brand=document.getElementById("brand").value;
let model=document.getElementById("model").value;
let year=document.getElementById("year").value;
let km=document.getElementById("kms").value;

let car=cars.find(c=>c.brand===brand && c.model===model);

if(!car){

document.getElementById("result").innerHTML="Car not found";
return;

}

let age=new Date().getFullYear()-year;


/* base depreciation */

let value=depreciation(car.onroad,age);


/* body demand */

value*=car.bodyfactor || 1;


/* fuel demand */

value*=car.fuelfactor || 1;


/* transmission demand */

value*=car.transfactor || 1;


/* owner factor */

value*=car.ownerfactor || 1;


/* brand strength */

value*=brandFactor(car.brand);


/* KM impact */

value*=kmFactor(km);


/* final price range */

let min=Math.round(value*0.95);
let max=Math.round(value*1.05);

document.getElementById("result").innerHTML=
"Estimated Used Car Price: ₹"+min+" – ₹"+max;

}

</script>
