<!DOCTYPE html>

<html>

<head>

<title>Used Car Price Calculator</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:360px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
}

input,select{
width:100%;
padding:10px;
margin-top:12px;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#2e7d32;
color:white;
border:none;
font-size:18px;
border-radius:5px;
cursor:pointer;
}

#result{
margin-top:20px;
font-size:18px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Check Used Car Price</h2>

<select id="brand" onchange="populateModels()">
<option value="">Select Brand</option>
<option>Maruti Suzuki</option>
<option>Hyundai</option>
<option>Tata</option>
<option>Mahindra</option>
<option>Toyota</option>
<option>Kia</option>
<option>Honda</option>
<option>Renault</option>
<option>Nissan</option>
</select>

<select id="model">
<option value="">Select Model</option>
</select>

  

<input type="number" id="year" placeholder="Manufacturing Year">

<input type="number" id="kms" placeholder="Kilometers Driven">

<button onclick="calculateValue()">Check Price</button>

<div id="result"></div>

</div>

<script>

let carDatabase = [];

async function loadCarData(){

const response = await fetch("data/car_data.csv");
const text = await response.text();

const rows = text.split("\n");

rows.forEach(row => {

if(!row.trim()) return;

const cols = row.split(",");

if(cols.length < 6) return;

carDatabase.push({
brand: cols[0].trim().toLowerCase(),
model: cols[1].trim().toLowerCase(),
segment: cols[2].trim().toLowerCase(),
basePrice: parseInt(cols[4]),
depreciation: parseFloat(cols[5])
});

});

console.log("Cars loaded:", carDatabase.length);

}

window.onload = loadCarData;

function calculateDepreciatedValue(basePrice, age){

let value = basePrice;

for(let i=1;i<=age;i++){

if(i==1) value *= 0.85;
else if(i==2) value *= 0.88;
else if(i==3) value *= 0.90;
else if(i==4) value *= 0.92;
else if(i==5) value *= 0.94;
else value *= 0.95;

}

return value;

}

  
function calculateValue(){

let brand = document.getElementById("brand").value.toLowerCase();
let model = document.getElementById("model").value.toLowerCase();
let year = document.getElementById("year").value;
let km = document.getElementById("kms").value;

let car = carDatabase.find(c =>
c.brand.includes(brand) && c.model.includes(model)
);

if(!car){

document.getElementById("result").innerHTML =
"Car not found in database";

return;

}

let age = new Date().getFullYear() - year;

let value = calculateDepreciatedValue(car.basePrice, age);


/* SUV demand adjustment */

let segment = car.segment;

if(segment.includes("suv") || segment.includes("utility")){
value = value * 1.08;
}


/* KM adjustment */

if(km < 20000) value = value * 1.05;
else if(km < 40000) value = value * 1.02;
else if(km < 70000) value = value * 1;
else if(km < 100000) value = value * 0.95;
else value = value * 0.90;


/* price range */

let minPrice = Math.round(value * 0.95);
let maxPrice = Math.round(value * 1.05);


document.getElementById("result").innerHTML =
"Estimated Used Car Price Range: ₹" + minPrice + " – ₹" + maxPrice;

}

</script>

</body>

</html>
