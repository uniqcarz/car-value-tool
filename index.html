<!DOCTYPE html>

<html>

<head>
<title>Used Car Price Calculator</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:380px;
box-shadow:0 0 10px rgba(0,0,0,0.15);
text-align:center;
}

select,input{
width:100%;
padding:10px;
margin-top:12px;
font-size:16px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#2e7d32;
color:white;
border:none;
font-size:18px;
border-radius:5px;
cursor:pointer;
}

#result{
margin-top:20px;
font-size:18px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Used Car Price Calculator</h2>

<select id="brand">
<option>Select Brand</option>
</select>

<select id="model">
<option>Select Model</option>
</select>

<input id="year" type="number" placeholder="Manufacturing Year">

<input id="kms" type="number" placeholder="Kilometers Driven">

<button onclick="calculateValue()">Check Price</button>

<div id="result"></div>

</div>

<script>

let cars = [];


/* LOAD DATASET */

document.addEventListener("DOMContentLoaded", loadCars);


async function loadCars(){

try{

const response = await fetch("cars.json");
const data = await response.json();

/* normalize dataset so missing fields never break the site */

cars = data.map(c => ({
brand: c.brand || "",
model: c.model || "",
onroad: Number(c.onroad) || 0,
bodyfactor: Number(c.bodyfactor) || 1,
fuelfactor: Number(c.fuelfactor) || 1,
transfactor: Number(c.transfactor) || 1,
ownerfactor: Number(c.ownerfactor) || 1
}));

populateBrands();

}
catch(error){

console.log("Dataset failed to load", error);

}

}


/* BRAND DROPDOWN */

function populateBrands(){

const dropdown = document.getElementById("brand");

dropdown.innerHTML = "<option>Select Brand</option>";

const brands = [...new Set(cars.map(c => c.brand))].filter(Boolean);

brands.sort();

brands.forEach(b => {

let option = document.createElement("option");

option.value = b;
option.text = b;

dropdown.appendChild(option);

});

dropdown.addEventListener("change", populateModels);

}


/* MODEL DROPDOWN */

function populateModels(){

const brand = document.getElementById("brand").value;

const dropdown = document.getElementById("model");

dropdown.innerHTML = "<option>Select Model</option>";

const models = cars.filter(c => c.brand === brand);

const unique = [...new Set(models.map(c => c.model))].filter(Boolean);

unique.sort();

unique.forEach(m => {

let option = document.createElement("option");

option.value = m;
option.text = m;

dropdown.appendChild(option);

});

}


/* DEPRECIATION CURVE */

function depreciation(price, age){

let value = price;

for(let i = 1; i <= age; i++){

if(i === 1) value *= 0.82;
else if(i === 2) value *= 0.88;
else if(i === 3) value *= 0.90;
else if(i === 4) value *= 0.92;
else if(i === 5) value *= 0.93;
else value *= 0.95;

}

return value;

}


/* KM FACTOR */

function kmFactor(km){

km = Number(km);

if(km < 20000) return 1.03;
if(km < 40000) return 1;
if(km < 60000) return 0.97;
if(km < 80000) return 0.94;
if(km < 100000) return 0.90;
if(km < 130000) return 0.85;

return 0.80;

}


/* BRAND RESALE FACTOR */

function brandFactor(brand){

brand = brand.toLowerCase();

if(brand.includes("toyota")) return 1.06;
if(brand.includes("maruti")) return 1.05;
if(brand.includes("hyundai")) return 1.04;
if(brand.includes("honda")) return 1.03;
if(brand.includes("tata")) return 1.02;
if(brand.includes("mahindra")) return 1.02;
if(brand.includes("volkswagen")) return 0.97;
if(brand.includes("skoda")) return 0.96;
if(brand.includes("renault")) return 0.95;
if(brand.includes("nissan")) return 0.94;

return 1;

}


/* PRICE CALCULATOR */

function calculateValue(){

const brand = document.getElementById("brand").value;
const model = document.getElementById("model").value;
const year = document.getElementById("year").value;
const km = document.getElementById("kms").value;

const car = cars.find(c => c.brand === brand && c.model === model);

if(!car){

document.getElementById("result").innerHTML = "Car not found";
return;

}

const age = new Date().getFullYear() - year;

/* depreciation */

let value = depreciation(car.onroad, age);

/* demand adjustments */

value *= car.bodyfactor;
value *= car.fuelfactor;
value *= car.transfactor;
value *= car.ownerfactor;

/* brand resale strength */

value *= brandFactor(car.brand);

/* km impact */

value *= kmFactor(km);

/* price range */

const min = Math.round(value * 0.95);
const max = Math.round(value * 1.05);

document.getElementById("result").innerHTML =
"Estimated Used Car Price: ₹" + min + " – ₹" + max;

}

</script>

</body>

</html>
