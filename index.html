<!DOCTYPE html>

<html>
<head>
<title>Used Car Price Tool</title>
</head>

<body>

<h2>Car Price Calculator</h2>

<select id="brand" onchange="populateModels()">
<option value="">Select Brand</option>
<option>Hyundai</option>
<option>Maruti Suzuki</option>
<option>Tata</option>
</select>

<br><br>

<select id="model">
<option>Select Model</option>
</select>

<br><br>

<input id="year" placeholder="Year">

<br><br>

<input id="kms" placeholder="KM Driven">

<br><br>

<button onclick="calculate()">Check Price</button>

<p id="result"></p>

<script>

let cars=[

{brand:"hyundai",model:"creta",price:1079000,segment:"suv"},
{brand:"hyundai",model:"i20",price:699000,segment:"hatchback"},

{brand:"maruti suzuki",model:"wagon r",price:550000,segment:"hatchback"},
{brand:"maruti suzuki",model:"swift",price:620000,segment:"hatchback"},

{brand:"tata",model:"nexon",price:800000,segment:"suv"}

];

function populateModels(){

let brand=document.getElementById("brand").value.toLowerCase();

let dropdown=document.getElementById("model");

dropdown.innerHTML="<option>Select Model</option>";

cars.filter(c=>c.brand.includes(brand)).forEach(car=>{

let opt=document.createElement("option");
opt.value=car.model;
opt.text=car.model;

dropdown.appendChild(opt);

});

}

function calculate(){

let brand=document.getElementById("brand").value.toLowerCase();
let model=document.getElementById("model").value.toLowerCase();
let year=document.getElementById("year").value;
let km=document.getElementById("kms").value;

let car=cars.find(c=>c.brand.includes(brand)&&c.model.includes(model));

if(!car){

document.getElementById("result").innerHTML="Car not found";
return;

}

let age=new Date().getFullYear()-year;

let value=car.price*Math.pow(0.9,age);

if(car.segment.includes("suv")) value*=1.08;

if(km>80000) value*=0.9;

let min=Math.round(value*0.95);
let max=Math.round(value*1.05);

document.getElementById("result").innerHTML="₹"+min+" - ₹"+max;

}

</script>

</body>
</html>
