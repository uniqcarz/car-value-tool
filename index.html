<!DOCTYPE html>

<html>
<head>
<title>Used Car Price Calculator India</title>
<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>

<h1>Used Car Price Calculator</h1>
<p>Check the estimated resale value of your car</p>

<label>Car Brand</label> <input type="text" id="brand" placeholder="Example: Hyundai">

<label>Model</label> <input type="text" id="model" placeholder="Example: i20">

<label>Year</label> <input type="number" id="year" placeholder="Example: 2019">

<label>Kilometers Driven</label> <input type="number" id="kms" placeholder="Example: 45000">

<label>Original Price (₹)</label> <input type="number" id="price" placeholder="Example: 850000">

<button onclick="calculateValue()">Check Used Car Price</button>

<h2 id="result"></h2>

<script src="script.js"></script>

</body>
</html>
